datasets:
  mathvista:
    hf_id: AI4Math/MathVista
    split: testmini
    target_n: 400
    category: math

  scienceqa:
    hf_id: lmms-lab/ScienceQA
    config: ScienceQA-IMG
    split: test
    target_n: 400
    category: science
    filter: "subject == 'natural science' and has_image == True"

  mmmu:
    hf_id: MMMU/MMMU
    split: validation
    target_n: 200
    category: stem
    subjects:
      - Math
      - Physics
      - Chemistry
      - Architecture_and_Engineering
      - Mechanical_Engineering
      - Computer_Science

translation:
  primary: ai4bharat/indictrans2-en-indic-1B
  batch_size: 32
  num_beams: 5
  max_length: 256
  verify_samples_per_lang: 100
  verify_api: gemini

evaluation:
  temperature: 0
  max_tokens_mcq: 512
  max_tokens_freeform: 1024
  numerical_tolerance: 0.05
  bootstrap_n: 2000
  significance_threshold: 0.05
